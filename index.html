    function makeArchiveDatabase() {
      const db = [];
      for (const part of PARTS) {
        for (const row of archiveSpec[part]) {
          const [id, label, emotion, f] = row;
          db.push({
            id,
            src: `archive/${id}.png`,
            part,
            material: label.split(",")[0],
            emotion,
            label,
            description: label,
            features: {
              roughness: f[0],
              pattern: f[1],
              curve: f[2],
              openness: f[3],
              symmetry: f[4],
              sharpness: f[5]
            }
          });
          matchUsage[id] = 0;
        }
      }
      return db;
    }

    function preload() {
      archiveDB = makeArchiveDatabase();

      for (const item of archiveDB) {
        archiveImages[item.id] = loadImage(
          item.src,
          () => {},
          () => { archiveImages[item.id] = null; }
        );
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);

      video = createCapture(
        { video: { facingMode: "user" }, audio: false },
        () => setStatus("camera active / loading facemesh…")
      );

      video.size(640, 480);
      video.hide();

      facemesh = ml5.facemesh(
        video,
        { maxFaces: 10, detectionConfidence: 0.5 },
        () => setStatus("facemesh active / waiting for faces")
      );

      facemesh.on("predict", results => {
        predictions = results;
      });

      textFont("Arial");
    }

    function draw() {
      background(5);

      push();
      translate(width, 0);
      scale(-1, 1);
      image(video, 0, 0, width, height);
      pop();

      fill(0, 120);
      noStroke();
      rect(0, 0, width, height);

      if (predictions.length === 0) {
        drawIdleState();
        updateSummary([]);
        return;
      }

      let allResults = [];

      for (let i = 0; i < predictions.length; i++) {
        const result = analyzeFace(predictions[i], i);
        allResults.push(result);
        drawFaceArchiveFill(result);
        drawFaceOverlay(predictions[i], result, i);
        drawFaceReadingPanel(result);
      }

      updateSummary(allResults);
      setStatus(`${predictions.length} face(s) detected / full archive matching active`);
    }

    function drawIdleState() {
      noFill();
      stroke(255, 45);
      strokeWeight(1);
      rectMode(CENTER);
      rect(width / 2, height / 2, 280, 360, 14);

      noStroke();
      fill(255, 130);
      textAlign(CENTER, CENTER);
      textSize(18);
      text("face not detected", width / 2, height / 2 - 10);
      textSize(12);
      text("please stand in front of the mirror", width / 2, height / 2 + 20);
      rectMode(CORNER);
    }

    function analyzeFace(face, index) {
      const anns = face.annotations;

      const mouthTop = avgPoint(anns.lipsUpperInner || anns.lipsUpperOuter);
      const mouthBottom = avgPoint(anns.lipsLowerInner || anns.lipsLowerOuter);
      const mouthLeft = anns.lipsUpperOuter[0];
      const mouthRight = anns.lipsUpperOuter[anns.lipsUpperOuter.length - 1];

      const leftEyeTop = avgPoint(anns.leftEyeUpper0);
      const leftEyeBottom = avgPoint(anns.leftEyeLower0);
      const rightEyeTop = avgPoint(anns.rightEyeUpper0);
      const rightEyeBottom = avgPoint(anns.rightEyeLower0);

      const leftBrow = avgPoint(anns.leftEyebrowUpper);
      const rightBrow = avgPoint(anns.rightEyebrowUpper);

      const betweenEyes = avgPoint(anns.midwayBetweenEyes);
      const noseTip = anns.noseTip ? avgPoint(anns.noseTip) : betweenEyes;

      const faceScale = max(
        dist2D(mouthLeft, mouthRight),
        dist2D(betweenEyes, mouthBottom),
        1
      );

      const mouthOpen = dist2D(mouthTop, mouthBottom) / faceScale;
      const mouthWidth = dist2D(mouthLeft, mouthRight) / faceScale;
      const mouthCenter = midpoint(mouthLeft, mouthRight);
      const mouthCurve = constrain(
        map((mouthCenter[1] - mouthTop[1]) / faceScale, -0.035, 0.065, 0, 1),
        0, 1
      );

      const leftEyeOpen = dist2D(leftEyeTop, leftEyeBottom) / faceScale;
      const rightEyeOpen = dist2D(rightEyeTop, rightEyeBottom) / faceScale;
      const eyeOpen = (leftEyeOpen + rightEyeOpen) * 0.5;
      const eyeSymmetry = 1 - constrain(abs(leftEyeOpen - rightEyeOpen) / 0.055, 0, 1);

      const leftBrowLift = dist2D(leftBrow, leftEyeTop) / faceScale;
      const rightBrowLift = dist2D(rightBrow, rightEyeTop) / faceScale;
      const browLift = (leftBrowLift + rightBrowLift) * 0.5;

      const browAsym = abs(leftBrow[1] - rightBrow[1]) / faceScale;
      const browCurve = constrain(map(browLift, 0.035, 0.18, 0.08, 0.96), 0, 1);
      const browOpenness = constrain(map(browLift, 0.035, 0.18, 0.08, 0.96), 0, 1);
      const browSharpness = constrain(map(browAsym, 0.00, 0.10, 0.12, 0.98), 0, 1);
      const browPattern = constrain((browCurve * 0.5) + (browSharpness * 0.5), 0, 1);
      const browRoughness = constrain(0.20 + browSharpness * 0.58 + (1 - eyeSymmetry) * 0.22, 0, 1);

      const noseLength = dist2D(betweenEyes, noseTip) / faceScale;

      // Nose-sensitive measurements:
      // These react to angle, shadow, local texture, and brightness.
      const noseDx = (noseTip[0] - betweenEyes[0]) / faceScale;
      const noseAngle = constrain(map(abs(noseDx), 0.00, 0.22, 0.05, 0.95), 0, 1);
      const nosePatch = samplePatchStats(noseTip[0], noseTip[1], faceScale * 0.18, faceScale * 0.22);
      const noseLeftPatch = samplePatchStats(noseTip[0] - faceScale * 0.16, noseTip[1], faceScale * 0.12, faceScale * 0.16);
      const noseRightPatch = samplePatchStats(noseTip[0] + faceScale * 0.16, noseTip[1], faceScale * 0.12, faceScale * 0.16);
      const noseShadow = constrain(abs(noseLeftPatch.avg - noseRightPatch.avg) / 95, 0, 1);
      const noseBrightness = constrain(map(nosePatch.avg, 35, 210, 0, 1), 0, 1);
      const noseTexture = constrain(map(nosePatch.variance, 2, 48, 0, 1), 0, 1);

      const bbox = getBoundingBox(
        face.scaledMesh.map(p => [mirrorX(mapX(p[0])), mapY(p[1])])
      );

      const faceW = max(bbox.maxX - bbox.minX, 1);
      const faceH = max(bbox.maxY - bbox.minY, 1);

      const skinRoughness = sampleSkinRoughness(bbox);
      const skinPattern = constrain(skinRoughness * 0.75 + (1 - eyeSymmetry) * 0.25, 0, 1);

      function browVector(singleLift, sideBias) {
        const c = constrain(map(singleLift, 0.035, 0.18, 0.08, 0.96), 0, 1);
        const sideSharpness = constrain(browSharpness * 0.65 + abs(sideBias) * 0.35, 0, 1);
        return {
          roughness: constrain(0.20 + sideSharpness * 0.58 + (1 - eyeSymmetry) * 0.22, 0, 1),
          pattern: constrain(c * 0.48 + sideSharpness * 0.52, 0, 1),
          curve: c,
          openness: constrain(map(singleLift, 0.035, 0.18, 0.08, 0.96), 0, 1),
          symmetry: constrain(1 - abs(sideBias), 0, 1),
          sharpness: sideSharpness
        };
      }

      function eyeVector(singleOpen, otherOpen) {
        const sideAsym = abs(singleOpen - otherOpen) / 0.055;
        return {
          roughness: constrain(0.18 + sideAsym * 0.30 + abs(singleOpen - 0.055) * 3.1, 0, 1),
          pattern: constrain(singleOpen * 8.0 + sideAsym * 0.22, 0, 1),
          curve: constrain(map(singleOpen, 0.012, 0.10, 0.10, 0.98), 0, 1),
          openness: constrain(map(singleOpen, 0.010, 0.105, 0.02, 0.99), 0, 1),
          symmetry: constrain(1 - sideAsym, 0, 1),
          sharpness: constrain(sideAsym * 0.45 + map(singleOpen, 0.012, 0.10, 0.16, 0.90), 0, 1)
        };
      }

      const featureVectors = {
        skin: {
          roughness: skinRoughness,
          pattern: skinPattern,
          curve: constrain(0.25 + skinRoughness * 0.45, 0, 1),
          openness: constrain(0.18 + skinPattern * 0.55, 0, 1),
          symmetry: eyeSymmetry,
          sharpness: constrain(skinRoughness * 0.9 + (1 - eyeSymmetry) * 0.1, 0, 1)
        },
        leftBrow: browVector(leftBrowLift, (leftBrow[1] - rightBrow[1]) / faceScale),
        rightBrow: browVector(rightBrowLift, (rightBrow[1] - leftBrow[1]) / faceScale),
        leftEye: eyeVector(leftEyeOpen, rightEyeOpen),
        rightEye: eyeVector(rightEyeOpen, leftEyeOpen),
        nose: {
          roughness: constrain(noseTexture * 0.62 + noseShadow * 0.28 + (1 - eyeSymmetry) * 0.10, 0, 1),
          pattern: constrain(noseBrightness * 0.34 + noseTexture * 0.34 + noseLength * 0.95, 0, 1),
          curve: constrain(map(noseLength, 0.12, 0.54, 0.08, 0.95) + noseAngle * 0.18, 0, 1),
          openness: constrain(noseShadow * 0.55 + (1 - noseBrightness) * 0.25 + noseTexture * 0.20, 0, 1),
          symmetry: constrain(1 - noseAngle, 0, 1),
          sharpness: constrain(noseAngle * 0.42 + noseShadow * 0.34 + noseTexture * 0.42, 0, 1)
        },
        mouth: {
          roughness: constrain(0.14 + mouthOpen * 2.4 + abs(mouthCurve - 0.5) * 0.35, 0, 1),
          pattern: constrain(mouthWidth * 1.2 + mouthOpen * 2.8, 0, 1),
          curve: mouthCurve,
          openness: constrain(map(mouthOpen, 0.004, 0.13, 0.02, 0.99), 0, 1),
          symmetry: eyeSymmetry,
          sharpness: constrain(abs(mouthCurve - 0.5) * 1.55 + mouthOpen * 1.35, 0, 1)
        }
      };

      // Aliases for old summary / target logic.
      featureVectors.brow = averageVector(featureVectors.leftBrow, featureVectors.rightBrow);
      featureVectors.eye = averageVector(featureVectors.leftEye, featureVectors.rightEye);

      let matches = {};
      matches.skin = findBestArchiveMatch("skin", featureVectors.skin, index, "skin");
      matches.leftBrow = findBestArchiveMatch("leftBrow", featureVectors.leftBrow, index, "brow");
      matches.rightBrow = findBestArchiveMatch("rightBrow", featureVectors.rightBrow, index, "brow");
      matches.leftEye = findBestArchiveMatch("leftEye", featureVectors.leftEye, index, "eye");
      matches.rightEye = findBestArchiveMatch("rightEye", featureVectors.rightEye, index, "eye");
      matches.nose = findBestArchiveMatch("nose", featureVectors.nose, index, "nose");
      matches.mouth = findBestArchiveMatch("mouth", featureVectors.mouth, index, "mouth");

      // Aliases for compact UI.
      matches.brow = matches.leftBrow;
      matches.eye = matches.leftEye;

      const emotionScores = emotionFromMatches(matches, featureVectors);
      const dominantEmotion = getDominantEmotion(emotionScores);
      const targetMatch = calculateTargetMatch(featureVectors, matches);

      const leftEyeCenter = midpoint(leftEyeTop, leftEyeBottom);
      const rightEyeCenter = midpoint(rightEyeTop, rightEyeBottom);

      return {
        index,
        bbox,
        faceW,
        faceH,
        featureVectors,
        metrics: {
          mouthOpen,
          mouthCurve,
          mouthWidth,
          eyeOpen,
          leftEyeOpen,
          rightEyeOpen,
          eyeSymmetry,
          browLift,
          leftBrowLift,
          rightBrowLift,
          browAsym,
          noseLength,
          noseAngle,
          noseShadow,
          noseBrightness,
          noseTexture,
          skinRoughness
        },
        matches,
        emotionScores,
        dominantEmotion,
        targetMatch,
        positions: {
          skin: { x: bbox.minX + faceW / 2, y: bbox.minY + faceH / 2 },
          leftBrow: toScreen(leftBrow),
          rightBrow: toScreen(rightBrow),
          leftEye: toScreen(leftEyeCenter),
          rightEye: toScreen(rightEyeCenter),
          nose: toScreen(noseTip),
          mouth: toScreen(mouthCenter)
        },
        angles: {
          leftBrow: 0,
          rightBrow: 0,
          leftEye: 0,
          rightEye: 0,
          nose: 0,
          mouth: 0
        }
      };
    }

    function findBestArchiveMatch(part, vector, faceIndex = 0, archivePart = null) {
      const candidates = archiveDB.filter(item => item.part === (archivePart || part));
      let scored = [];
      const key = `${faceIndex}_${part}`;

      // Nose-specific smoothing:
      // It still reacts to small angle / shadow / length changes,
      // but the values are softened across frames so it does not jump nonstop.
      let activeVector = vector;
      if (part === "nose") {
        if (!smoothedFeatureVectors[key]) {
          smoothedFeatureVectors[key] = { ...vector };
        } else {
          for (const k in vector) {
            smoothedFeatureVectors[key][k] =
              smoothedFeatureVectors[key][k] * NOSE_SMOOTHING +
              vector[k] * (1 - NOSE_SMOOTHING);
          }
        }
        activeVector = smoothedFeatureVectors[key];
      }

      for (const item of candidates) {
        const f = item.features;
        const usage = matchUsage[item.id] || 0;

        let d =
          abs(activeVector.roughness - f.roughness) * 1.00 +
          abs(activeVector.pattern - f.pattern) * 1.05 +
          abs(activeVector.curve - f.curve) * 1.25 +
          abs(activeVector.openness - f.openness) * 1.15 +
          abs(activeVector.symmetry - f.symmetry) * 0.75 +
          abs(activeVector.sharpness - f.sharpness) * 1.00;

        if (part === "nose") {
          // Less random movement and weaker usage penalty for nose,
          // so it does not rotate images too quickly.
          d += usage * NOSE_USAGE_BALANCE;
          d += random(-NOSE_RANDOMNESS, NOSE_RANDOMNESS);
        } else {
          d += usage * USAGE_BALANCE;
          d += random(-MATCH_RANDOMNESS, MATCH_RANDOMNESS);
        }

        scored.push({ item, score: d });
      }

      scored.sort((a, b) => a.score - b.score);

      let chosen = scored[0].item;
      let chosenScore = scored[0].score;

      const previousId = stableMatches[key];
      const previousScore = stableScores[key];
      const margin = part === "nose" ? NOSE_SWITCH_MARGIN : SWITCH_MARGIN;

      // Stabilizer:
      // Keep the previous match unless the new one is clearly better.
      // For nose, this threshold is stronger, so tiny webcam noise will not cause flicker.
      if (previousId && previousScore !== undefined) {
        const previousCandidate = scored.find(s => s.item.id === previousId);
        if (previousCandidate && scored[0].score > previousCandidate.score - margin) {
          chosen = previousCandidate.item;
          chosenScore = previousCandidate.score;
        }
      }

      if (previousId !== chosen.id) {
        matchUsage[chosen.id] = (matchUsage[chosen.id] || 0) + 1;
      }

      stableMatches[key] = chosen.id;
      stableScores[key] = chosenScore;

      return {
        ...chosen,
        similarity: constrain(1 - chosenScore / 5.8, 0, 1)
      };
    }

    function emotionFromMatches(matches, featureVectors = null) {
      const scores = {};

      function add(emotion, amount) {
        if (!scores[emotion]) scores[emotion] = 0;
        scores[emotion] += max(0, amount);
      }

      // Archive still matters, but it is now weaker.
      // The live face movement should decide the main reading.
      const weightedParts = [
        ["skin", 0.25],
        ["leftBrow", 0.32],
        ["rightBrow", 0.32],
        ["leftEye", 0.35],
        ["rightEye", 0.35],
        ["nose", 0.28],
        ["mouth", 0.42]
      ];

      for (const [key, weight] of weightedParts) {
        const m = matches[key];
        if (!m) continue;
        add(normalizeEmotion(m.emotion), m.similarity * weight);
      }

      if (featureVectors) {
        const mouth = featureVectors.mouth;
        const eye = featureVectors.eye;
        const brow = featureVectors.brow;
        const skin = featureVectors.skin;
        const nose = featureVectors.nose;

        const smile = mouth.curve;
        const mouthOpen = mouth.openness;
        const eyeOpen = eye.openness;
        const browLift = brow.openness;
        const browTension = brow.sharpness;
        const asym = 1 - min(mouth.symmetry, eye.symmetry, brow.symmetry);
        const skinNoise = skin.roughness;
        const noseTension = nose.sharpness;

        // These rules are intentionally simple and visible.
        // They are not truth. They are the system's forced interpretation.

        // HAPPY: upturned mouth, not too much tension.
        add("happy", map(smile, 0.58, 0.95, 0, 3.6) * map(mouthOpen, 0.05, 0.75, 1.2, 0.55));

        // SAD: downturned mouth + lower energy / less eye openness.
        add("sad", map(0.42 - smile, 0, 0.42, 0, 3.4) + map(0.42 - eyeOpen, 0, 0.42, 0, 1.2));

        // SHOCK: mouth very open + eyes open.
        add("shock", map(mouthOpen, 0.58, 0.98, 0, 3.8) + map(eyeOpen, 0.68, 0.98, 0, 1.8));

        // FEAR: eyes and brows open, but mouth not necessarily smiling.
        add("fear", map(eyeOpen, 0.62, 0.98, 0, 2.2) + map(browLift, 0.62, 0.98, 0, 2.0) + map(skinNoise, 0.55, 1.0, 0, 0.8));

        // ANGRY: brow tension + low/flat mouth + nose tension.
        add("angry", map(browTension, 0.62, 0.98, 0, 2.8) + map(0.55 - smile, 0, 0.55, 0, 1.3) + map(noseTension, 0.60, 0.98, 0, 1.0));

        // DISGUST: nose/tension + mouth not open.
        add("disgust", map(noseTension, 0.65, 0.98, 0, 2.3) * map(0.55 - mouthOpen, 0, 0.55, 0.4, 1.1));

        // SKEPTICISM: asymmetry, one-sided reading.
        add("skepticism", map(asym, 0.28, 0.85, 0, 2.9));

        // CALM: low openness, low tension, high symmetry.
        const calmBase =
          map(0.34 - mouthOpen, 0, 0.34, 0, 1.2) +
          map(0.44 - browTension, 0, 0.44, 0, 1.1) +
          map(min(mouth.symmetry, eye.symmetry), 0.55, 0.98, 0, 1.4) +
          map(0.45 - skinNoise, 0, 0.45, 0, 0.8);
        add("calm", calmBase);

        // PAIN: high tension, asymmetry, low smile.
        add("pain", map(browTension + noseTension + asym, 1.55, 2.6, 0, 2.2) + map(0.38 - smile, 0, 0.38, 0, 0.8));
      }

      let total = Object.values(scores).reduce((a, b) => a + b, 0);
      if (total <= 0) return { calm: 100 };

      for (const key in scores) {
        scores[key] = (scores[key] / total) * 100;
      }

      return scores;
    }

    function normalizeEmotion(emotion) {
      const e = String(emotion || "calm").toLowerCase();

      if (e.includes("happy") || e.includes("joy") || e.includes("optimism") || e.includes("pleasure")) return "happy";
      if (e.includes("sad") || e.includes("sorrow") || e.includes("despair") || e.includes("melancholy") || e.includes("crying")) return "sad";
      if (e.includes("fear") || e.includes("anxious") || e.includes("anxiety") || e.includes("suffocation") || e.includes("oppression")) return "fear";
      if (e.includes("anger") || e.includes("angry") || e.includes("rage") || e.includes("severe") || e.includes("threat")) return "angry";
      if (e.includes("disgust")) return "disgust";
      if (e.includes("shock") || e.includes("surprise") || e.includes("wonder") || e.includes("scream")) return "shock";
      if (e.includes("contempt") || e.includes("skepticism") || e.includes("sarcasm") || e.includes("refusal")) return "skepticism";
      if (e.includes("calm") || e.includes("neutral") || e.includes("indifference") || e.includes("apathy") || e.includes("numb")) return "calm";
      if (e.includes("pain") || e.includes("agony") || e.includes("trauma")) return "pain";

      return e;
    }

    function calculateTargetMatch(featureVectors, matches) {
      const keys = ["skin", "leftBrow", "rightBrow", "leftEye", "rightEye", "nose", "mouth"];
      let similarityTotal = 0;

      for (const key of keys) {
        similarityTotal += matches[key].similarity;
      }

      const averageSimilarity = similarityTotal / keys.length;

      const systemPreference =
        (1 - featureVectors.skin.roughness) * 0.16 +
        featureVectors.brow.symmetry * 0.16 +
        featureVectors.eye.openness * 0.18 +
        featureVectors.nose.symmetry * 0.16 +
        featureVectors.mouth.curve * 0.18 +
        featureVectors.mouth.openness * 0.16;

      return constrain((averageSimilarity * 0.62 + systemPreference * 0.38) * 100, 0, 98);
    }

    function drawFaceOverlay(face, result, faceIndex) {
      const pts = face.scaledMesh.map(p => [mirrorX(mapX(p[0])), mapY(p[1])]);
      const bbox = result.bbox;

      noFill();
      stroke(255, 160);
      strokeWeight(1.2);
      rect(bbox.minX, bbox.minY, bbox.maxX - bbox.minX, bbox.maxY - bbox.minY, 10);

      stroke(255, 35);
      strokeWeight(1);
      for (let i = 0; i < pts.length; i += 9) {
        point(pts[i][0], pts[i][1]);
      }
    }

    function drawFaceArchiveFill(result) {
      const bbox = result.bbox;
      const faceW = result.faceW;
      const faceH = result.faceH;

      // 1. Skin is the lowest archive layer. It fills the whole detected face box.
      const skinImg = archiveImages[result.matches.skin.id];
      if (skinImg) {
        push();
        tint(255, 105);
        imageMode(CENTER);
        image(skinImg, result.positions.skin.x, result.positions.skin.y, faceW * 1.05, faceH * 1.05);
        noTint();
        pop();
      }

      // 2. Feature images are placed directly over their detected facial regions.
      drawFeatureImage(result.matches.leftEye, result.positions.leftEye, faceW * 0.23, faceH * 0.105, result.angles.leftEye, 205);
      drawFeatureImage(result.matches.rightEye, result.positions.rightEye, faceW * 0.23, faceH * 0.105, result.angles.rightEye, 205);

      drawFeatureImage(result.matches.leftBrow, result.positions.leftBrow, faceW * 0.25, faceH * 0.075, result.angles.leftBrow, 215);
      drawFeatureImage(result.matches.rightBrow, result.positions.rightBrow, faceW * 0.25, faceH * 0.075, result.angles.rightBrow, 215);

      drawFeatureImage(result.matches.nose, result.positions.nose, faceW * 0.20, faceH * 0.25, result.angles.nose, 210);
      drawFeatureImage(result.matches.mouth, result.positions.mouth, faceW * 0.34, faceH * 0.13, result.angles.mouth, 220);


    }

    function drawFeatureImage(match, pos, w, h, angle = 0, alpha = 210) {
      const img = archiveImages[match.id];
      if (!img) {
        push();
        noStroke();
        fill(35, 190);
        rectMode(CENTER);
        rect(pos.x, pos.y, w, h, 6);
        fill(255, 120);
        textSize(8);
        textAlign(CENTER, CENTER);
        text("missing", pos.x, pos.y);
        pop();
        return;
      }

      push();
      translate(pos.x, pos.y);
      rotate(angle);
      imageMode(CENTER);
      tint(255, alpha);
      image(img, 0, 0, w, h);
      noTint();

      // outline of the filled feature window
      noFill();
      stroke(255, 90);
      strokeWeight(0.8);
      rectMode(CENTER);
      rect(0, 0, w, h, 5);
      pop();
    }

    function drawFaceReadingPanel(result) {
      const x = constrain(result.bbox.minX, 10, width - 330);
      const y = constrain(result.bbox.minY - 98, 10, height - 110);
      const w = min(320, max(230, result.faceW * 1.15));
      const h = 82;

      const phrase = buildMaterialPhrase(result);
      const critique = buildCritiqueSentence(result);

      push();
      noStroke();
      fill(0, 178);
      rect(x, y, w, h, 12);

      stroke(255, 55);
      noFill();
      rect(x, y, w, h, 12);

      noStroke();
      fill(255, 230);
      textAlign(LEFT, TOP);
      textSize(11);
      text(`overall reading: ${result.dominantEmotion}`, x + 12, y + 10, w - 24, 16);

      fill(255, 172);
      textSize(9.5);
      text(phrase, x + 12, y + 30, w - 24, 20);

      fill(255, 220);
      textSize(10.5);
      text(critique, x + 12, y + 56, w - 24, 18);
      pop();
    }

    function buildMaterialPhrase(result) {
      const keys = ["skin", "leftBrow", "rightBrow", "leftEye", "rightEye", "nose", "mouth"];
      const words = [];

      for (const key of keys) {
        const m = result.matches[key];
        const labelParts = m.label.split(",").map(s => s.trim());
        if (labelParts.length >= 2) {
          words.push(labelParts[0] + " / " + labelParts[1]);
        } else {
          words.push(m.label);
        }
      }

      return words.join(" · ");
    }

    function buildCritiqueSentence(result) {
      const key = `face_${result.index}`;
      const nextSentence = buildRawCritiqueSentence(result);
      const current = lockedCritiques[key];

      // Keep each sentence for at least 3 seconds.
      if (!current || frameCount - current.frame > CRITIQUE_HOLD_FRAMES) {
        lockedCritiques[key] = {
          sentence: nextSentence,
          frame: frameCount
        };
      }

      return lockedCritiques[key].sentence;
    }

    function buildRawCritiqueSentence(result) {
      const all = [
        result.matches.skin,
        result.matches.leftBrow,
        result.matches.rightBrow,
        result.matches.leftEye,
        result.matches.rightEye,
        result.matches.nose,
        result.matches.mouth
      ];

      const joined = all.map(m => `${m.label} ${m.emotion}`).join(" ").toLowerCase();
      const emotion = result.dominantEmotion;

      let verb = "compressing";
      let object = "feeling into a readable surface";

      if (emotion === "fear" || joined.includes("suffocation") || joined.includes("oppression")) {
        verb = "training";
        object = "panic into evidence";
      } else if (emotion === "angry" || joined.includes("rage") || joined.includes("threat")) {
        verb = "polishing";
        object = "anger into a useful signal";
      } else if (emotion === "sad" || joined.includes("melancholy") || joined.includes("crying")) {
        verb = "flattening";
        object = "sadness into a surface defect";
      } else if (emotion === "calm" || joined.includes("neutral") || joined.includes("indifference")) {
        verb = "performing";
        object = "neutrality as obedience";
      } else if (emotion === "happy" || joined.includes("joy") || joined.includes("optimism")) {
        verb = "selling";
        object = "pleasure back to the system";
      } else if (emotion === "skepticism" || joined.includes("contempt") || joined.includes("sarcasm") || joined.includes("refusal")) {
        verb = "hiding";
        object = "refusal inside a measurable expression";
      } else if (emotion === "shock" || joined.includes("scream")) {
        verb = "opening";
        object = "shock for the camera";
      } else if (emotion === "disgust") {
        verb = "turning";
        object = "disgust into technical texture";
      } else if (emotion === "pain") {
        verb = "archiving";
        object = "pain as proof of legibility";
      } else if (joined.includes("judgment") || joined.includes("rational") || joined.includes("mechanical")) {
        verb = "disciplining";
        object = "thought into machine-readable order";
      }

      return `${verb} ${object}.`;
    }

    function updateSummary(results) {
      // Left UI is hidden in this version.
      // Each detected face now carries its own reading panel.
      return;
    }

    function samplePatchStats(cx, cy, rx, ry) {
      const cols = 4;
      const rows = 4;
      let values = [];

      for (let iy = 0; iy < rows; iy++) {
        for (let ix = 0; ix < cols; ix++) {
          const px = floor(constrain(cx - rx + (ix / (cols - 1)) * rx * 2, 0, video.width - 1));
          const py = floor(constrain(cy - ry + (iy / (rows - 1)) * ry * 2, 0, video.height - 1));
          const c = video.get(px, py);
          const b = (red(c) + green(c) + blue(c)) / 3;
          values.push(b);
        }
      }

      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const variance = sqrt(values.reduce((a, b) => a + pow(b - avg, 2), 0) / values.length);

      return { avg, variance };
    }

    function sampleSkinRoughness(bbox) {
      const sampleCount = 16;
      let values = [];

      for (let i = 0; i < sampleCount; i++) {
        const x = floor(map(i % 4, 0, 3, bbox.minX + 20, bbox.maxX - 20));
        const y = floor(map(floor(i / 4), 0, 3, bbox.minY + 30, bbox.maxY - 30));

        const videoX = floor(map(width - x, 0, width, 0, video.width));
        const videoY = floor(map(y, 0, height, 0, video.height));

        const c = video.get(videoX, videoY);
        const brightness = (red(c) + green(c) + blue(c)) / 3;
        values.push(brightness);
      }

      let avg = values.reduce((a, b) => a + b, 0) / values.length;
      let variance = values.reduce((a, b) => a + pow(b - avg, 2), 0) / values.length;
      return constrain(map(sqrt(variance), 0, 55, 0, 1), 0, 1);
    }

    function getDominantEmotion(scores) {
      let best = "calm";
      let bestValue = -1;
      for (const key in scores) {
        if (scores[key] > bestValue) {
          best = key;
          bestValue = scores[key];
        }
      }
      return best;
    }

    function averageVector(a, b) {
      return {
        roughness: (a.roughness + b.roughness) / 2,
        pattern: (a.pattern + b.pattern) / 2,
        curve: (a.curve + b.curve) / 2,
        openness: (a.openness + b.openness) / 2,
        symmetry: (a.symmetry + b.symmetry) / 2,
        sharpness: (a.sharpness + b.sharpness) / 2
      };
    }

    function setStatus(message) {
      document.getElementById("statusText").innerText = message;
    }

    function toScreen(point) {
      return { x: mirrorX(mapX(point[0])), y: mapY(point[1]) };
    }

    function mirrorX(x) { return width - x; }
    function mapX(x) { return map(x, 0, video.width, 0, width); }
    function mapY(y) { return map(y, 0, video.height, 0, height); }

    function avgPoint(points) {
      let x = 0, y = 0;
      for (let p of points) {
        x += p[0];
        y += p[1];
      }
      return [x / points.length, y / points.length];
    }

    function midpoint(a, b) {
      return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
    }

    function dist2D(a, b) {
      return dist(a[0], a[1], b[0], b[1]);
    }

    function getBoundingBox(points) {
      const xs = points.map(p => p[0]);
      const ys = points.map(p => p[1]);
      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys)
      };
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
